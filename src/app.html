<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<meta name="theme-color" content="#4CAF50" />
		<meta name="description" content="Farm chore tracking for the whole team" />

		<!-- iOS PWA Support -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="KSF" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />

		<!-- Favicon -->
		<link rel="icon" href="/favicon.ico" sizes="any" />

		%sveltekit.head%

		<style>
			/* Global reset and base styles */
			*,
			*::before,
			*::after {
				box-sizing: border-box;
			}

			html,
			body {
				margin: 0;
				padding: 0;
				font-family:
					system-ui,
					-apple-system,
					BlinkMacSystemFont,
					'Segoe UI',
					Roboto,
					'Helvetica Neue',
					Arial,
					sans-serif;
				-webkit-font-smoothing: antialiased;
				-moz-osx-font-smoothing: grayscale;
			}

			#boot-fallback {
				position: fixed;
				inset: 0;
				display: none;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 1rem;
				padding: 1.5rem;
				background: #f9fafb;
				color: #111827;
				text-align: center;
				z-index: 9999;
			}
			#boot-fallback.show {
				display: flex;
			}
			#boot-fallback h1 {
				font-size: 1.125rem;
				margin: 0;
				font-weight: 600;
			}
			#boot-fallback p {
				margin: 0;
				color: #6b7280;
				max-width: 24rem;
				line-height: 1.5;
			}
			#boot-fallback button {
				padding: 0.75rem 1.25rem;
				min-height: 48px;
				border-radius: 0.5rem;
				border: none;
				background: #22c55e;
				color: white;
				font-size: 1rem;
				font-weight: 500;
				cursor: pointer;
			}
		</style>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<div id="boot-fallback" role="alert" aria-live="polite">
			<h1>App failed to load</h1>
			<p>
				This usually means a stale cache. Tap reload to fetch a fresh copy. If it keeps
				happening, close the app and reopen it.
			</p>
			<button type="button" onclick="window.bootFallbackReload()">Reload app</button>
		</div>
		<script>
			(function () {
				// If the SvelteKit app hasn't mounted any visible content within
				// the timeout, assume a script-load failure and surface a reload UI
				// so users aren't stuck on a white screen.
				var BOOT_TIMEOUT_MS = 6000;
				var fallback = document.getElementById('boot-fallback');
				var hadError = false;

				window.addEventListener('error', function (e) {
					// Track script-load failures (resource errors don't bubble normally)
					if (e && e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
						hadError = true;
					}
				}, true);

				window.bootFallbackReload = function () {
					// Best-effort: unregister service workers and clear caches so the
					// next load is fresh. Some browsers reject these in private mode —
					// fall through to a hard reload either way.
					var done = function () {
						window.location.reload();
					};
					try {
						var tasks = [];
						if ('serviceWorker' in navigator) {
							tasks.push(
								navigator.serviceWorker.getRegistrations().then(function (regs) {
									return Promise.all(regs.map(function (r) { return r.unregister(); }));
								}).catch(function () {})
							);
						}
						if (window.caches && caches.keys) {
							tasks.push(
								caches.keys().then(function (keys) {
									return Promise.all(keys.map(function (k) { return caches.delete(k); }));
								}).catch(function () {})
							);
						}
						Promise.all(tasks).then(done, done);
					} catch (_) {
						done();
					}
				};

				setTimeout(function () {
					// If the SvelteKit root element has rendered any content, we're fine
					var root = document.querySelector('body > div');
					if (root && root.childElementCount > 0 && !hadError) return;
					if (fallback) fallback.classList.add('show');
				}, BOOT_TIMEOUT_MS);
			})();
		</script>
	</body>
</html>
